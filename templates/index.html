<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resist. Resistor Decoder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo">resist<span class="accent-dot">.</span></div>
      <p class="tagline">Identify a resistor's resistance instantly</p>
    </header>

    <!-- Mode Tabs -->
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="image" role="tab" aria-selected="true">Photo / Camera</button>
      <button class="tab" data-tab="manual" role="tab" aria-selected="false">Manual</button>
    </nav>

    <!-- ── IMAGE MODE ───────────────────────────────── -->
    <section id="tab-image" class="tab-panel" role="tabpanel">

      <!-- Input area: dropzone OR preview -->
      <div id="inputArea">

        <!-- Dropzone (default) -->
        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload resistor image">
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
          <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="dz-title">Drop a resistor photo here</p>
          <p class="dz-hint">JPG · PNG · WebP &nbsp;·&nbsp; max 10 MB</p>
          <div class="dz-btns">
            <button class="btn btn-accent" id="selectBtn" type="button">Browse Files</button>
            <button class="btn btn-ghost" id="cameraBtn" type="button">Use Camera</button>
          </div>
        </div>

        <!-- Preview: canvas (file) or video (camera) -->
        <div id="previewArea" class="preview-area hidden">
          <button class="clear-btn" id="clearBtn" type="button" aria-label="Clear image" title="Clear">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 2l12 12M14 2L2 14"/></svg>
          </button>
          <canvas id="previewCanvas"></canvas>
          <video id="videoEl" autoplay playsinline class="hidden"></video>
          <div id="cameraHint" class="camera-hint hidden">Point at a resistor, then tap Analyze</div>
        </div>
      </div>

      <!-- Analyze button -->
      <button id="analyzeBtn" class="btn-analyze hidden" type="button" disabled>
        <span id="analyzeTxt">Analyze Bands</span>
        <div class="btn-spinner hidden" id="analyzeSpinner"></div>
      </button>

      <!-- Gemini override toggle -->
      <label class="gemini-toggle hidden" id="geminiToggle">
        <input type="checkbox" id="useGemini" />
        <span class="toggle-label">Try Gemini instead</span>
      </label>

    </section>

    <!-- ── MANUAL MODE ──────────────────────────────── -->
    <section id="tab-manual" class="tab-panel hidden" role="tabpanel">

      <!-- Live resistor SVG -->
      <div class="res-wrap">
        <svg id="resSvg" viewBox="0 0 340 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#dfc07a"/>
              <stop offset="45%"  stop-color="#c8a055"/>
              <stop offset="100%" stop-color="#a07030"/>
            </linearGradient>
            <linearGradient id="bodyGradShine" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
              <stop offset="50%"  stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
          </defs>
          <!-- Leads -->
          <line x1="0"   y1="40" x2="60"  y2="40" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="280" y1="40" x2="340" y2="40" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Body -->
          <rect x="60" y="18" width="220" height="44" rx="10" fill="url(#bodyGrad)"/>
          <rect x="60" y="18" width="220" height="44" rx="10" fill="url(#bodyGradShine)"/>
          <!-- Bands injected here -->
          <g id="svgBands"></g>
        </svg>
      </div>

      <!-- Band count -->
      <div class="band-count-row">
        <span class="bc-label">Bands</span>
        <div class="segmented" id="bandCountSeg" role="group" aria-label="Number of bands">
          <button class="seg-btn" data-n="3" type="button">3</button>
          <button class="seg-btn active" data-n="4" type="button">4</button>
          <button class="seg-btn" data-n="5" type="button">5</button>
          <button class="seg-btn" data-n="6" type="button">6</button>
        </div>
      </div>

      <!-- Band pickers (rendered by JS) -->
      <div id="bandPickers"></div>

      <!-- Inline result -->
      <div id="manualResult" class="manual-result hidden">
        <span class="mr-label">Resistance</span>
        <span class="mr-value" id="mrValue">—</span>
        <span class="mr-meta" id="mrMeta"></span>
      </div>

    </section>

    <!-- ── RESULT PANEL (image mode) ────────────────── -->
    <div id="resultPanel" class="result-panel hidden">
      <p class="rp-label">Resistance</p>
      <div class="rp-value" id="rpValue">—</div>
      <div class="rp-chips" id="rpChips"></div>
      <div class="rp-bands-label">Detected bands</div>
      <div class="rp-bands" id="rpBands"></div>
      <p class="rp-confidence" id="rpConfidence"></p>
    </div>

    <!-- ── ERROR PANEL ───────────────────────────────── -->
    <div id="errorPanel" class="error-panel hidden">
      <svg viewBox="0 0 20 20" fill="currentColor" class="err-icon" aria-hidden="true">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
      </svg>
      <span id="errorMsg"></span>
    </div>

    <!-- ── FOOTER ─────────────────────────────────── -->
    <footer class="site-footer">
      <a href="https://github.com/praneel7015/resist." target="_blank" rel="noopener noreferrer" class="gh-link" aria-label="View source on GitHub">
        <svg class="gh-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        <span>praneel7015/resist.</span>
      </a>
    </footer>

  </div><!-- /.app -->
  <script src="/static/app.js"></script>
</body>
</html>
